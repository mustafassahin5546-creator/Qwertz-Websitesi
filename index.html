<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwertz'in Dünyası</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { --main-bg: #0f172a; --accent: #00ff88; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: #fff; 
            margin: 0; min-height: 100vh; text-align: center;
            user-select: none; -webkit-user-select: none;
        }
        .page { display: none; padding: 20px; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%); z-index: -1; }
        
        .container { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); max-width: 500px; width: 90%; position: relative; margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: var(--accent); font-size: 24px; text-shadow: 0 0 15px rgba(0,255,136,0.3); margin-top: 0; }
        
        button { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-game { background: #f59e0b; color: #fff; width: 80%; margin-top: 15px; font-size: 18px; }
        .btn-evet { background: #10b981; color: #fff; flex: 1; }
        .btn-hayir { background: #ef4444; color: #fff; flex: 1; }
        .btn-control { background: #3b82f6; color: white; width: 100%; margin-top: 15px; }
        .btn-clear { background: #64748b; color: white; width: 100%; margin-top: 5px; }
        .btn-back { background: #475569; color: white; margin-top: 20px; }
        
        /* Çizim Alanı */
        #paintCanvas { background: #ffffff; border-radius: 15px; border: 3px solid #334155; cursor: crosshair; touch-action: none; margin: 15px 0 5px 0; }
        .color-palette { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 50px; }
        .color-box { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-box.selected { border-color: #ffffff; transform: scale(1.15); box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .game-meta { display: flex; justify-content: space-between; width: 100%; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        #timer { color: #ef4444; }
        #ai-task { color: #38ef7d; font-size: 20px; text-shadow: 0 0 10px rgba(56,239,125,0.4); }

        .overlay-error { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); border-radius: 25px; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .crossmark { font-size: 80px; color: #ef4444; }

        /* YORUM BÖLÜMÜ YENİ STİLİ */
        .review-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .review-section h3 { color: #00d2ff; margin-bottom: 15px; font-size: 18px; text-align: center; }

        /* GÜZELLEŞTİRİLMİŞ MÜZİK BUTONU */
        .floating-music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #e11d48;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(225, 29, 72, 0.4);
            z-index: 9999;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .floating-music-btn:hover {
            transform: scale(1.05);
            background: #be123c;
        }
        /* Gizli video alanı (YouTube API'nin çalışması için gerekli) */
        #yt-player-container {
            position: fixed;
            bottom: -100px;
            left: -100px;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            z-index: -10;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="yt-player-container"></div>
    <button id="music-btn" class="floating-music-btn" onclick="toggleMusic()">🎵 Müzik Aç</button>

    <div id="survey-page" class="page active">
        <div class="container">
            <h1>Qwertz'in Websitesine Hoşgeldiniz!</h1>
            <p style="font-size: 18px; color: #cbd5e1;">Web sitem güzel olmuş mu?</p>
            
            <div style="display: flex; gap: 15px; width: 80%; margin: 0 auto 20px auto;">
                <button id="btn-evet" class="btn-evet" onclick="oyVer('evet')">EVET 👍</button>
                <button id="btn-hayir" class="btn-hayir" onclick="oyVer('hayir')">HAYIR 👎</button>
            </div>
            <button class="btn-game" onclick="gecSayfa('game-page')">🎮 YAPAY ZEKA ÇİZİM OYUNU</button>

            <div class="review-section">
                <h3>✍️ Ziyaretçi Yorumları</h3>
                <div id="disqus_thread"></div>
                <script>
                    var disqus_config = function () {
                        this.page.url = window.location.href;  
                        this.page.identifier = "qwertz-dunyasi-ana-sayfa"; 
                    };
                    (function() { 
                        var d = document, s = d.createElement('script');
                        s.src = 'https://qwertz-world.disqus.com/embed.js';
                        s.setAttribute('data-timestamp', +new Date());
                        (d.head || d.body).appendChild(s);
                    })();
                </script>
            </div>

        </div>
    </div>

    <div id="game-page" class="page">
        <div class="container">
            <h1>AI Çabuk Çiz!</h1>
            
            <div class="game-meta">
                <div>Süre: <span id="timer">60</span>s</div>
                <div>Görev: <span id="ai-task">-</span></div>
            </div>

            <canvas id="paintCanvas" width="300" height="300"></canvas>

            <div class="color-palette">
                <div class="color-box selected" style="background: #0f172a;" onclick="setRenk('#0f172a', this)"></div>
                <div class="color-box" style="background: #ef4444;" onclick="setRenk('#ef4444', this)"></div>
                <div class="color-box" style="background: #f59e0b;" onclick="setRenk('#f59e0b', this)"></div>
                <div class="color-box" style="background: #10b981;" onclick="setRenk('#10b981', this)"></div>
                <div class="color-box" style="background: #3b82f6;" onclick="setRenk('#3b82f6', this)"></div>
                <div class="color-box" style="background: #a855f7;" onclick="setRenk('#a855f7', this)"></div>
            </div>

            <button class="btn-control" onclick="aiTarama()">🔍 YAPAY ZEKA KONTROL ETSİN</button>
            <button class="btn-clear" onclick="clearCanvas()">🗑️ Temizle</button>
            <button class="btn-back" onclick="gecSayfa('survey-page')">← Geri Dön</button>

            <div id="error-screen" class="overlay-error">
                <div class="crossmark">❌</div>
                <h2 style="color: #ef4444;">Yapay Zeka Benzetemedi!</h2>
                <p style="color: #cbd5e1; padding: 0 20px;">AI: "Bu hiç söylediğim şeye benzemiyor, tekrar dene!"</p>
                <button onclick="yenidenDene()" style="background: #f59e0b; color: white; margin-top: 15px;">🔄 Rastgele Yeni Görev Al</button>
            </div>
        </div>
    </div>

    <script>
        // --- YOUTUBE MÜZİK OYNATMA SİSTEMİ ---
        let ytPlayer;
        let isMusicPlaying = false;
        
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-container', {
                height: '10',
                width: '10',
                videoId: 'C2eaXq8zB2c', // Aleyna Tilki - Sen Olsan Bari
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'showinfo': 0,
                    'rel': 0
                }
            });
        }

        function toggleMusic() {
            if (!ytPlayer || typeof ytPlayer.playVideo !== 'function') {
                alert("Müzik sistemi başlatılıyor, lütfen 1 saniye sonra tekrar deneyin.");
                return;
            }
            
            let btn = document.getElementById('music-btn');
            if (isMusicPlaying) {
                ytPlayer.pauseVideo();
                btn.innerHTML = '🎵 Müzik Aç';
                btn.style.background = '#e11d48';
            } else {
                ytPlayer.playVideo();
                btn.innerHTML = '⏸️ Müziği Durdur';
                btn.style.background = '#10b981';
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function gecSayfa(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'game-page') oyunBaslat();
            else oynaBitir();
        }

        function oyVer(tip) {
            confetti({particleCount: 80, spread: 60});
            document.getElementById('btn-evet').disabled = true;
            document.getElementById('btn-hayir').disabled = true;
            alert("Oyunuz başarıyla kaydedildi! Teşekkürler.");
        }

        // --- AI ÇİZİM OYUN MOTORU ---
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let sure = 60;
        let zamanlayici;
        
        const gorevler = ["Mandalina", "Çubuk Adam", "Ev", "Gözlük", "Güneş", "Araba", "Kedi", "Ağaç"];
        let aktifGorev = "";

        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#0f172a';

        function setRenk(yeniRenk, eleman) {
            ctx.strokeStyle = yeniRenk;
            document.querySelectorAll('.color-box').forEach(box => box.classList.remove('selected'));
            eleman.classList.add('selected');
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e.touches[0]); });
        canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left;
            const y = (e.clientY || e.pageY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function aiKonus(metin) {
            if ('speechSynthesis' in window) {
                const speech = new SpeechSynthesisUtterance(metin);
                speech.lang = 'tr-TR';
                window.speechSynthesis.speak(speech);
            }
        }

        function oyunBaslat() {
            clearCanvas();
            document.getElementById('error-screen').style.display = 'none';
            ctx.strokeStyle = '#0f172a';
            document.querySelectorAll('.color-box').forEach(box => box.classList.remove('selected'));
            document.querySelector('.color-palette .color-box').classList.add('selected');

            aktifGorev = gorevler[Math.floor(Math.random() * gorevler.length)];
            document.getElementById('ai-task').innerText = aktifGorev;
            
            setTimeout(() => {
                aiKonus("Lütfen ekrana bir " + aktifGorev + " çiziniz.");
            }, 300);

            sure = 60;
            document.getElementById('timer').innerText = sure;
            clearInterval(zamanlayici);
            zamanlayici = setInterval(() => {
                sure--;
                document.getElementById('timer').innerText = sure;
                if(sure <= 0) {
                    clearInterval(zamanlayici);
                    aiTarama();
                }
            }, 1000);
        }

        function oynaBitir() {
            clearInterval(zamanlayici);
        }

        function aiTarama() {
            clearInterval(zamanlayici);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let cizilenPikselSayisi = 0;
            
            for (let i = 0; i < imgData.data.length; i += 4) {
                if (imgData.data[i+3] > 0) cizilenPikselSayisi++;
            }

            if (cizilenPikselSayisi < 50) {
                aiKonus("Boş ekranı tarayamam, lütfen bir şeyler çizin.");
                oyunBaslat();
                return;
            }

            let aiBenzettiMi = Math.random() > 0.45; 

            if (aiBenzettiMi) {
                aiKonus("Harika! Bu çizim kesinlikle bir " + aktifGorev + ".");
                confetti({particleCount: 150, spread: 80});
                alert("Tebrikler! Yapay zeka çizdiğiniz resmi bild: " + aktifGorev);
                oyunBaslat();
            } else {
                aiKonus("Maalesef benzetemedim. Tekrar deneyin.");
                document.getElementById('error-screen').style.display = 'flex';
            }
        }

        function yenidenDene() {
            oyunBaslat();
        }
    </script>
</body>
</html>
